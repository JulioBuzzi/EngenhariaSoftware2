name: CI/CD Pipeline - Sistema de Saúde (Java + React)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ========================================
  # JOB 1: TESTES DO BACKEND (Java/Spring Boot)
  # ========================================
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: agenda_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Testes Unitários (JUnit 5 + Mockito)
        run: mvn test -Dtest="*ControllerTest" -B

      - name: 🔗 Testes de Integração (Spring Boot + PostgreSQL)
        run: mvn test -Dtest="IntegracaoTest" -B
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: agenda_test
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: 📊 Cobertura de código (JaCoCo > 80%)
        run: |
          mvn verify -B
          echo "✅ Relatório de cobertura gerado em target/site/jacoco/"

  # ========================================
  # JOB 2: TESTES DO FRONTEND (React)
  # ========================================
  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 📦 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🧪 Testes unitários React (Jest)
        run: npm test -- --coverage --watchAll=false

      - name: 🏗️ Build de produção
        run: npm run build

  # ========================================
  # JOB 3: DEPLOY (CD) — dispara o deploy no Render
  # ========================================
  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Disparar deploy do backend no Render
        run: |
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
          echo "✅ Deploy do backend disparado no Render!"

      - name: 🚀 Disparar deploy do frontend no Render
        run: |
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
          echo "✅ Deploy do frontend disparado no Render!"

      - name: ⏳ Aguardar propagação do deploy
        run: sleep 60

      - name: 🏁 Health Check do backend em produção
        run: |
          curl -f ${{ secrets.RENDER_BACKEND_URL }}/api/profissionais-saude || exit 1
          echo "✅ Backend respondendo em produção no Render!"

      - name: 🏁 Health Check do frontend em produção
        run: |
          curl -f ${{ secrets.RENDER_FRONTEND_URL }} || exit 1
          echo "✅ Frontend respondendo em produção no Render!"